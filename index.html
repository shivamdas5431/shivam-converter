<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIVAM CYBER-CORE V14</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="progress-container"><div id="blue-strip"></div></div>

    <div class="terminal-bar top">
        <span>SESSION: #SH-2026-ADMIN-ACTIVE</span>
        <span id="live-clock">00:00:00</span>
    </div>

    <main class="dashboard">
        <div id="ai-advisor">SYSTEM READY: WAITING FOR INPUT...</div>

        <div class="matrix-grid">
            <div class="cyber-box"><label>TEXT</label><textarea id="txt" placeholder="Type here..."></textarea></div>
            <div class="cyber-box"><label>BINARY</label><textarea id="bin" placeholder="0101..."></textarea></div>
            <div class="cyber-box"><label>HEXA</label><textarea id="hex" placeholder="4A 5F..."></textarea></div>
            <div class="cyber-box"><label>OCTAL</label><textarea id="oct" placeholder="112..."></textarea></div>
        </div>

        <div class="toggle-center">
            <div class="toggle-group"><span>MANUAL/AUTO</span><div class="helicopter-switch" id="main-toggle" onclick="this.classList.toggle('active')"><div class="knob"></div></div></div>
            <div class="toggle-group"><span>FINGERPRINT LOCK</span><div class="helicopter-switch" id="lock-toggle" onclick="this.classList.toggle('active')"><div class="knob"></div></div></div>
        </div>

        <div class="scanner-trigger" onclick="openScanner()">
            <div class="fingerprint-icon">🖐️</div>
            <p>OPEN STEGANO-VAULT</p>
        </div>
    </main>

    <div id="scanner-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeScanner()">&times;</span>
            <div class="scan-options">
                <button>📸 SCAN PHOTO</button>
                <button>🖼️ GALLERY</button>
                <button>📄 PDF/DOC</button>
            </div>
            <input type="text" placeholder="Photo Name/ID">
            <input type="password" placeholder="Enter Security Key">
            <button class="btn-primary">DECRYPT</button>
        </div>
    </div>

    <div class="terminal-bar bottom">> MASTER_ACCESS: READY</div>
    <script src="script.js"></script>
</body>
</html>

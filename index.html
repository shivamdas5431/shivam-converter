<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam Code Pro - No Refresh Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --neon: #39ff14; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; border: 2px solid var(--neon); padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); text-align: center; }
        textarea { width: 100%; height: 80px; background: #1a1a1a; border: 1px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 16px; outline: none; }
        .res-box { text-align: left; margin: 10px 0; padding: 10px; border-radius: 5px; background: #111; border-left: 4px solid var(--neon); position: relative; min-height: 40px; }
        .copy-btn { position: absolute; right: 5px; top: 5px; font-size: 10px; padding: 2px 5px; background: #333; color: var(--neon); border: 1px solid var(--neon); cursor: pointer; }
        button { background: black; color: white; border: 1px solid var(--neon); padding: 10px 15px; cursor: pointer; border-radius: 5px; margin: 5px; transition: 0.3s; }
        button:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>
    <div id="login-box" class="container">
        <h2 style="color: var(--neon);">SHIVAM CONVERTER</h2>
        <button onclick="login()">LOGIN WITH GOOGLE</button>
    </div>

    <div id="app-main" class="container" style="display:none;">
        <div id="user-tag" style="font-size:12px; color:#888; margin-bottom:10px;">User: Loading...</div>
        <h2 style="color: var(--neon);">SHIVAM SMART PRO</h2>
        
        <textarea id="userInput" placeholder="Likhein ya Code paste karein..." oninput="smartConvert()"></textarea>
        
        <div class="res-box"><strong>BINARY:</strong> <div id="out-bin">...</div> <button class="copy-btn" onclick="copyIndividual('out-bin')">COPY</button></div>
        <div class="res-box" style="border-color:#00f3ff;"><strong>HEX:</strong> <div id="out-hex">...</div> <button class="copy-btn" onclick="copyIndividual('out-hex')">COPY</button></div>
        <div class="res-box" style="border-color:#bc13fe;"><strong>OCTAL:</strong> <div id="out-oct">...</div> <button class="copy-btn" onclick="copyIndividual('out-oct')">COPY</button></div>
        
        <button onclick="auth.signOut().then(() => location.reload())" style="color:red; border-color:red; margin-top:20px;">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHpXAaOOpppB95h2mrwQKGSvuasqSwQt8",
            authDomain: "shivam-code-converter.firebaseapp.com",
            projectId: "shivam-code-converter",
            storageBucket: "shivam-code-converter.firebasestorage.app",
            messagingSenderId: "245086667262",
            appId: "1:245086667262:web:03b2c25f37529d72ab80af"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => auth.signInWithRedirect(provider));
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('user-tag').innerText = "Active: " + user.displayName;
            }
        });

        function smartConvert() {
            let input = document.getElementById('userInput').value.trim();
            
            // FIX: Agar input khali hai toh boxes ko bhi khali kar do
            if(!input) {
                document.getElementById('out-bin').innerText = "...";
                document.getElementById('out-hex').innerText = "...";
                document.getElementById('out-oct').innerText = "...";
                return;
            }

            // Logic for Binary to Text
            if (/^[01\s]+$/.test(input) && input.length > 7) {
                try {
                    let text = input.split(' ').map(bin => String.fromCharCode(parseInt(bin, 2))).join('');
                    document.getElementById('out-bin').innerText = "Text: " + text;
                } catch(e) { }
            } else {
                // Text to Code
                document.getElementById('out-bin').innerText = input.split('').map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
                document.getElementById('out-hex').innerText = input.split('').map(c => c.charCodeAt(0).toString(16).toUpperCase()).join(' ');
                document.getElementById('out-oct').innerText = input.split('').map(c => c.charCodeAt(0).toString(8)).join(' ');
            }
        }

        function copyIndividual(id) {
            let text = document.getElementById(id).innerText;
            if(text === "...") return;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>

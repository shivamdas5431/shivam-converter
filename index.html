<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIVAM CYBER-CORE V14 PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="progress-container"><div id="blue-strip"></div></div>

    <div class="terminal-bar top">
        <span>MASTER_SESSION: #SH-2026</span>
        <div class="three-dots" onclick="toggleMenu()">⋮</div>
    </div>

    <div id="side-menu" class="side-panel">
        <div id="ai-2-info">AI-2: MASTER CONTROLLER</div>
        <hr>
        <button onclick="shareWA()">📤 SHARE REPORT (WA)</button>
        <button onclick="downloadTXT()">📥 DOWNLOAD TXT</button>
        <button onclick="openHistory()">📜 HISTORY & LOGS</button>
    </div>

    <main class="dashboard">
        <div id="ai-1-monitor">AI-1 MONITOR: SYSTEM READY</div>

        <div class="matrix-grid">
            <div class="cyber-box"><label>TEXT</label><textarea id="txt" placeholder="Paste/Type here..."></textarea></div>
            <div class="cyber-box"><label>BINARY</label><textarea id="bin" readonly></textarea></div>
            <div class="cyber-box"><label>HEX</label><textarea id="hex" readonly></textarea></div>
            <div class="cyber-box"><label>OCTAL</label><textarea id="oct" readonly></textarea></div>
        </div>

        <div class="vault-container">
            <div class="thumb-door" onclick="openVault()">
                <div class="silver-scanner"></div>
                <p>THUMB SCANNER ENTRY</p>
            </div>
        </div>
    </main>

    <div id="vault-modal" class="modal">
        <div class="modal-content cyber-blue-box">
            <span class="close" onclick="closeVault()">&times;</span>
            <div id="ai-3-guardian">AI-3: VAULT GUARDIAN ACTIVE</div>
            
            <div class="scan-grid">
                <button>📸 LIVE CAMERA SCAN</button>
                <button>🖼️ GALLERY IMPORT</button>
                <button>🎵 AUDIO/WA FILE</button>
                <button>🎥 VIDEO ATTACH</button>
            </div>

            <div class="export-section">
                <h4>EXPORT & HIDE</h4>
                <input type="text" id="ai-prompt" placeholder="Type shape (e.g. Elephant, Space, Car)...">
                <button class="btn-gen" onclick="generateAIImage()">GENERATE & HIDE DATA</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
